<?xml version="1.0" encoding="UTF-8"?>
<!-- Tray icon: idle – grey floppy, pulse dot -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- floppy body -->
  <rect x="2" y="2" width="18" height="18" rx="2" ry="2" fill="#757575" stroke="#424242" stroke-width="1"/>
  <!-- label area -->
  <rect x="4" y="6" width="14" height="8" rx="1" ry="1" fill="#BDBDBD"/>
  <!-- shutter -->
  <rect x="2" y="15" width="18" height="5" rx="1" ry="1" fill="#616161"/>
  <rect x="7" y="15" width="8" height="5" rx="1" ry="1" fill="#9E9E9E"/>
  <!-- write-protect notch -->
  <rect x="2" y="3" width="3" height="3" rx="0.5" fill="#616161"/>
  <!-- "waiting" dots on label -->
  <circle cx="7"  cy="10" r="1.2" fill="#9E9E9E"/>
  <circle cx="11" cy="10" r="1.2" fill="#9E9E9E"/>
  <circle cx="15" cy="10" r="1.2" fill="#9E9E9E"/>
</svg>
