name: Build waffle-fuse on macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # macos-13 is the last Intel runner; macFUSE (x86_64) is well-tested on it.
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install macFUSE
        run: |
          brew install --cask macfuse

      - name: Build waffle-fuse
        run: |
          cd waffle-fuse
          make

      - name: Show build info
        run: waffle-fuse/waffle-fuse 2>&1 | head -1 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waffle-fuse-macos
          path: waffle-fuse/waffle-fuse

      - name: Create Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: waffle-fuse/waffle-fuse
          draft: false
          prerelease: false
